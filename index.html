<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dự đoán kì</title>

<style>
:root {
  --bg: #fff5f6;
  --card: #ffffff;
  --text: #333;
  --accent: #ff4d6d;
  --secondary: #ffb3c1;
  --gray: #f0f0f0;
}
.dark {
  --bg: #1a1a1a;
  --card: #2d2d2d;
  --text: #eee;
  --accent: #ff758f;
  --secondary: #591e29;
  --gray: #3d3d3d;
}
* { box-sizing: border-box; transition: 0.3s; }
body {
  margin: 0;
  font-family: -apple-system, system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
}
.app { width: 100%; max-width: 450px; padding: 20px; }
h2 { text-align: center; color: var(--accent); margin-bottom: 25px; }

.card {
  background: var(--card);
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 20px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

label { font-weight: bold; font-size: 14px; display: block; margin-bottom: 8px; }
input {
  width: 100%;
  padding: 12px;
  border: 2px solid var(--gray);
  border-radius: 12px;
  font-size: 16px;
  background: var(--card);
  color: var(--text);
  margin-bottom: 15px;
}
input:focus { border-color: var(--accent); outline: none; }

.btn-group { display: flex; gap: 10px; }
button {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  font-size: 15px;
}
.btn-main { background: var(--accent); color: white; }
.btn-main:active { transform: scale(0.95); }
.btn-toggle { background: var(--gray); color: var(--text); width: 50px; flex: none; }

/* Thống kê */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.stat-item { background: var(--bg); padding: 10px; border-radius: 10px; text-align: center; }
.stat-val { display: block; font-size: 18px; font-weight: bold; color: var(--accent); }

/* Lịch */
.calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 15px; }
.calendar-header { text-align: center; font-weight: bold; font-size: 12px; opacity: 0.6; padding-bottom: 5px; }
.day { text-align: center; padding: 8px 0; border-radius: 50%; font-size: 14px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; }
.period { background: var(--accent) !important; color: white !important; font-weight: bold; box-shadow: 0 2px 8px var(--accent); }
.today { border: 2px solid var(--accent); }

/* Lịch sử */
.history-list { max-height: 150px; overflow-y: auto; margin-top: 10px; }
.history-item { 
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px; border-bottom: 1px solid var(--gray); 
}
.del-btn { color: #ff4d4d; cursor: pointer; font-size: 12px; background: none; border: 1px solid #ff4d4d; padding: 2px 8px; border-radius: 5px; }
</style>
</head>
<body>

<div class="app">
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <h2>🌸 Nhật Ký Dâu Tây</h2>
    <button class="btn-toggle" onclick="toggleDark()">🌙</button>
  </div>

  <div class="card">
    <label>Ngày bắt đầu kỳ này</label>
    <input type="date" id="startDate">
    
    <label>Chu kỳ của bạn (ngày)</label>
    <input type="number" id="cycleInput" placeholder="Thường là 28-30">
    
    <button class="btn-main" onclick="addPeriod()">Lưu & Cập nhật</button>
  </div>

  <div id="resultBox" class="card" style="display:none;">
    <b>Trạng thái hiện tại</b>
    <div class="stats-grid">
      <div class="stat-item">
        <span class="small">Kỳ tiếp theo</span>
        <span class="stat-val" id="nextDateText">--</span>
      </div>
      <div class="stat-item">
        <span class="small">Đếm ngược</span>
        <span class="stat-val" id="countdownText">--</span>
      </div>
    </div>
    
    <div class="calendar" id="calendar"></div>
  </div>

  <div class="card" id="historyBox" style="display:none;">
    <b>Dữ liệu các kỳ trước</b>
    <div class="history-list" id="historyList"></div>
    <button onclick="clearAll()" style="background:none; color:gray; font-size:12px; margin-top:10px; border:none; width:100%">Xóa tất cả dữ liệu</button>
  </div>
</div>

<script>
const DB_KEY = "period_pro_data";
const CYCLE_KEY = "user_cycle_pref";

let history = JSON.parse(localStorage.getItem(DB_KEY) || "[]");
let userCycle = localStorage.getItem(CYCLE_KEY) || 28;

// Khởi tạo
document.getElementById('cycleInput').value = userCycle;
if(history.length > 0) updateUI();

function toggleDark() { document.body.classList.toggle("dark"); }

function addPeriod() {
    const dateInput = document.getElementById('startDate').value;
    const cycleInput = document.getElementById('cycleInput').value;

    if(!dateInput) return alert("Bạn chưa chọn ngày kìa!");
    
    // Cập nhật chu kỳ ưu tiên
    userCycle = parseInt(cycleInput) || 28;
    localStorage.setItem(CYCLE_KEY, userCycle);

    // Chống trùng ngày
    if(!history.includes(dateInput)) {
        history.push(dateInput);
        history.sort((a,b) => new Date(a) - new Date(b));
        localStorage.setItem(DB_KEY, JSON.stringify(history));
    }
    
    updateUI();
}

function deleteItem(index) {
    if(!confirm("Xóa ngày này khỏi lịch sử?")) return;
    history.splice(index, 1);
    localStorage.setItem(DB_KEY, JSON.stringify(history));
    updateUI();
}

function clearAll() {
    if(!confirm("Bạn có chắc muốn xóa sạch sành sanh không?")) return;
    localStorage.clear();
    location.reload();
}

function updateUI() {
    if(history.length === 0) return;
    
    document.getElementById('resultBox').style.display = 'block';
    document.getElementById('historyBox').style.display = 'block';

    const lastDate = new Date(history[history.length - 1]);
    const nextDate = new Date(lastDate);
    nextDate.setDate(lastDate.getDate() + parseInt(userCycle));

    // Hiển thị text
    document.getElementById('nextDateText').innerText = nextDate.toLocaleDateString('vi-VN', {day:'2-digit', month:'2-digit'});
    
    const today = new Date();
    today.setHours(0,0,0,0);
    const diffDays = Math.ceil((nextDate - today) / (1000*60*60*24));
    
    let statusText = "";
    if(diffDays > 0) statusText = diffDays + " ngày";
    else if (diffDays === 0) statusText = "Hôm nay!";
    else statusText = "Trễ " + Math.abs(diffDays) + " ngày";
    document.getElementById('countdownText').innerText = statusText;

    renderCalendar(nextDate);
    renderHistory();
}

function renderCalendar(targetDate) {
    const cal = document.getElementById('calendar');
    cal.innerHTML = `
        <div class="calendar-header">T2</div><div class="calendar-header">T3</div>
        <div class="calendar-header">T4</div><div class="calendar-header">T5</div>
        <div class="calendar-header">T6</div><div class="calendar-header">T7</div>
        <div class="calendar-header">CN</div>
    `;

    const y = targetDate.getFullYear(), m = targetDate.getMonth();
    const firstDayIndex = new Date(y, m, 1).getDay();
    const adjFirstDay = firstDayIndex === 0 ? 6 : firstDayIndex - 1; // Chỉnh cho T2 là đầu tuần
    const daysInMonth = new Date(y, m + 1, 0).getDate();

    for(let i=0; i<adjFirstDay; i++) cal.innerHTML += "<div></div>";

    for(let d=1; d<=daysInMonth; d++) {
        const curr = new Date(y, m, d);
        let cls = "day";
        
        // Đánh dấu 5 ngày dự kiến
        const periodEnd = new Date(targetDate);
        periodEnd.setDate(targetDate.getDate() + 4);

        if(curr >= targetDate && curr <= periodEnd) cls += " period";
        if(curr.toDateString() === new Date().toDateString()) cls += " today";

        cal.innerHTML += `<div class="${cls}">${d}</div>`;
    }
}

function renderHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = "";
    [...history].reverse().forEach((date, idx) => {
        const realIdx = history.length - 1 - idx;
        list.innerHTML += `
            <div class="history-item">
                <span>${new Date(date).toLocaleDateString('vi-VN')}</span>
                <button class="del-btn" onclick="deleteItem(${realIdx})">Xóa</button>
            </div>
        `;
    });
}
</script>

</body>
</html>
