<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Dự đoán kinh nguyệt</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f7f7f7;
    padding: 20px;
  }
  .box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 400px;
    margin: auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }
  button {
    padding: 8px 15px;
    border: none;
    background: #ff6b81;
    color: white;
    border-radius: 5px;
    cursor: pointer;
  }
  p { margin: 8px 0; }
</style>
</head>

<body>
<div class="box">
  <h2>🌸 Dự đoán kinh nguyệt</h2>

  <label>Ngày bắt đầu kỳ gần nhất:</label><br>
  <input type="date" id="start"><br><br>

  <label>Chu kỳ (ngày):</label><br>
  <input type="number" id="cycle" value="29"><br><br>

  <button onclick="predict()">Dự đoán</button>

  <div id="result"></div>
</div>

<script>
function formatDate(d) {
  return d.toLocaleDateString("vi-VN");
}

function predict() {
  let startValue = document.getElementById("start").value;
  let cycle = parseInt(document.getElementById("cycle").value);

  if (!startValue) {
    alert("Nhập ngày bắt đầu kỳ!");
    return;
  }

  let start = new Date(startValue);

  let next = new Date(start);
  next.setDate(start.getDate() + cycle);

  let heavyStart = new Date(next);
  let heavyEnd = new Date(next);
  heavyEnd.setDate(heavyStart.getDate() + 3);

  let lightStart = new Date(heavyEnd);
  lightStart.setDate(lightStart.getDate() + 1);

  let lightEnd = new Date(lightStart);
  lightEnd.setDate(lightStart.getDate() + 1);

  document.getElementById("result").innerHTML = `
    <hr>
    <p><b>🩸 Kỳ tiếp theo dự kiến:</b> ${formatDate(next)}</p>
    <p><b>🔴 Ra nhiều:</b> ${formatDate(heavyStart)} → ${formatDate(heavyEnd)}</p>
    <p><b>🌸 Ra rải rác:</b> ${formatDate(lightStart)} → ${formatDate(lightEnd)}</p>
  `;
}
</script>
</body>
</html>
