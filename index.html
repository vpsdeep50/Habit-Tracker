<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dự đoán kinh nguyệt</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text);
}
:root{
  --bg:#ffffff;
  --card:#fff0f3;
  --text:#000;
  --accent:#ff6b81;
}
.dark{
  --bg:#121212;
  --card:#1f1f1f;
  --text:#fff;
}
.app{
  min-height:100vh;
  padding:20px;
}
h2{text-align:center;margin-top:0}
label{font-weight:600}
input,button{
  width:100%;
  padding:12px;
  font-size:16px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ccc;
}
button{
  background:var(--accent);
  color:white;
  border:none;
  margin-top:14px;
}
.card{
  background:var(--card);
  padding:14px;
  border-radius:12px;
  margin-top:16px;
}
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:10px;
}
.day{
  text-align:center;
  padding:6px;
  border-radius:6px;
}
.period{background:#ffb3c1}
.today{border:2px solid var(--accent)}
.toggle{
  text-align:right;
  margin-bottom:10px;
}
</style>
</head>

<body>
<div class="app">
  <div class="toggle">
    <button onclick="toggleDark()">🌙</button>
  </div>

  <h2>🌸 Dự đoán kinh nguyệt</h2>

  <label>Ngày bắt đầu kỳ gần nhất</label>
  <input type="date" id="start">

  <label style="margin-top:12px;display:block;">Chu kỳ (ngày)</label>
  <input type="number" id="cycle" value="29">

  <button onclick="predict()">Dự đoán</button>

  <div id="info" class="card" style="display:none;"></div>
  <div id="calendarBox" class="card" style="display:none;">
    <b>📆 Lịch tháng</b>
    <div class="calendar" id="calendar"></div>
  </div>
</div>

<script>
const startInput=document.getElementById("start");
const cycleInput=document.getElementById("cycle");

if(localStorage.start){
  startInput.value=localStorage.start;
  cycleInput.value=localStorage.cycle;
}

if(window.matchMedia('(prefers-color-scheme: dark)').matches){
  document.body.classList.add("dark");
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

function format(d){
  return d.toLocaleDateString("vi-VN");
}

function predict(){
  if(!startInput.value){alert("Nhập ngày bắt đầu kỳ nha!");return;}

  localStorage.start=startInput.value;
  localStorage.cycle=cycleInput.value;

  const start=new Date(startInput.value);
  const cycle=parseInt(cycleInput.value);
  const next=new Date(start);
  next.setDate(start.getDate()+cycle);

  const now=new Date();
  const remain=Math.ceil((next-now)/(1000*60*60*24));

  document.getElementById("info").style.display="block";
  document.getElementById("info").innerHTML=`
    <p><b>🩸 Kỳ tiếp theo:</b> ${format(next)}</p>
    <p><b>⏳ Còn:</b> ${remain>0?remain+" ngày":"đang tới / trễ"}</p>
    <p><b>🔴 Ra nhiều:</b> ${format(next)} – ${format(new Date(next.getTime()+3*86400000))}</p>
    <p><b>🌸 Ra rải rác:</b> ${format(new Date(next.getTime()+4*86400000))} – ${format(new Date(next.getTime()+5*86400000))}</p>
  `;

  renderCalendar(next);
}

function renderCalendar(periodStart){
  const cal=document.getElementById("calendar");
  cal.innerHTML="";
  document.getElementById("calendarBox").style.display="block";

  const year=periodStart.getFullYear();
  const month=periodStart.getMonth();
  const first=new Date(year,month,1).getDay();
  const days=new Date(year,month+1,0).getDate();

  for(let i=0;i<first;i++) cal.innerHTML+="<div></div>";

  for(let d=1;d<=days;d++){
    const date=new Date(year,month,d);
    let cls="day";
    if(date.toDateString()==new Date().toDateString()) cls+=" today";
    if(date>=periodStart && date<=new Date(periodStart.getTime()+5*86400000)) cls+=" period";
    cal.innerHTML+=`<div class="${cls}">${d}</div>`;
  }
}
</script>
</body>
</html>
