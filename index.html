<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dự đoán kinh nguyệt</title>

<style>
*{box-sizing:border-box}
:root{
  --bg:#ffffff;
  --card:#fff0f3;
  --text:#000;
  --accent:#ff6b81;
}
.dark{
  --bg:#121212;
  --card:#1f1f1f;
  --text:#fff;
}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text);
}
.app{min-height:100vh;padding:20px}
h2{text-align:center;margin-top:0}
label{font-weight:600}
input,button{
  width:100%;
  padding:12px;
  font-size:16px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ccc;
}
button{
  background:var(--accent);
  color:#fff;
  border:none;
  margin-top:14px;
}
.card{
  background:var(--card);
  padding:14px;
  border-radius:12px;
  margin-top:16px;
}
.toggle{text-align:right}
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:10px;
}
.day{text-align:center;padding:6px;border-radius:6px}
.period{background:#ffb3c1}
.today{border:2px solid var(--accent)}
.history-item{
  padding:6px 0;
  border-bottom:1px dashed #ccc;
}
.small{font-size:14px;opacity:.8}
</style>
</head>

<body>
<div class="app">
  <div class="toggle">
    <button onclick="toggleDark()">🌙</button>
  </div>

  <h2>🌸 Dự đoán kinh nguyệt</h2>

  <label>Ngày bắt đầu kỳ mới</label>
  <input type="date" id="start">

  <button onclick="addPeriod()">Lưu kỳ này</button>

  <div id="info" class="card" style="display:none;"></div>
  <div id="calendarBox" class="card" style="display:none;">
    <b>📆 Lịch kỳ tiếp theo</b>
    <div class="calendar" id="calendar"></div>
  </div>
  <div id="historyBox" class="card" style="display:none;">
    <b>📚 Lịch sử các kỳ</b>
    <div id="history"></div>
  </div>
</div>

<script>
const key="period_history";
let history=JSON.parse(localStorage.getItem(key)||"[]");

if(window.matchMedia('(prefers-color-scheme: dark)').matches){
  document.body.classList.add("dark");
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

function format(d){
  return d.toLocaleDateString("vi-VN");
}

function addPeriod(){
  const val=document.getElementById("start").value;
  if(!val){alert("Nhập ngày bắt đầu kỳ nha!");return;}

  history.push(val);
  history=[...new Set(history)].sort();
  localStorage.setItem(key,JSON.stringify(history));

  predict();
}

function avgCycle(){
  if(history.length<2) return 29;
  let total=0;
  for(let i=1;i<history.length;i++){
    total+=(new Date(history[i])-new Date(history[i-1]))/86400000;
  }
  return Math.round(total/(history.length-1));
}

function predict(){
  if(history.length===0) return;

  const last=new Date(history[history.length-1]);
  const cycle=avgCycle();
  const next=new Date(last);
  next.setDate(last.getDate()+cycle);

  const remain=Math.ceil((next-new Date())/86400000);

  document.getElementById("info").style.display="block";
  document.getElementById("info").innerHTML=`
    <p><b>🩸 Kỳ gần nhất:</b> ${format(last)}</p>
    <p><b>📊 Chu kỳ TB:</b> ${cycle} ngày</p>
    <p><b>🩸 Kỳ tiếp theo:</b> ${format(next)}</p>
    <p><b>⏳ Còn:</b> ${remain>0?remain+" ngày":"đang tới / trễ"}</p>
  `;

  renderCalendar(next);
  renderHistory();
}

function renderCalendar(start){
  const cal=document.getElementById("calendar");
  cal.innerHTML="";
  document.getElementById("calendarBox").style.display="block";

  const y=start.getFullYear(),m=start.getMonth();
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const end=new Date(start.getTime()+5*86400000);

  for(let i=0;i<first;i++) cal.innerHTML+="<div></div>";
  for(let d=1;d<=days;d++){
    const date=new Date(y,m,d);
    let cls="day";
    if(date>=start&&date<=end) cls+=" period";
    if(date.toDateString()==new Date().toDateString()) cls+=" today";
    cal.innerHTML+=`<div class="${cls}">${d}</div>`;
  }
}

function renderHistory(){
  const box=document.getElementById("historyBox");
  const h=document.getElementById("history");
  box.style.display="block";
  h.innerHTML="";
  history.slice().reverse().forEach((d,i)=>{
    h.innerHTML+=`<div class="history-item">${format(new Date(d))}</div>`;
  });
}

if(history.length>0) predict();
</script>
</body>
</html>
